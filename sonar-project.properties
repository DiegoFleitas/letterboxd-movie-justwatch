# SonarCloud — project must exist at https://sonarcloud.io (GitHub import or manual).
# Keys must match SonarCloud (My Account → Organizations, project Administration → Update Key).
sonar.organization=diegofleitas
sonar.projectKey=DiegoFleitas_letterboxd-movie-justwatch

sonar.sourceEncoding=UTF-8
sonar.sources=src/server,src/client/src
sonar.tests=tests,src/client/src/__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/test-results/**,**/playwright-report/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
