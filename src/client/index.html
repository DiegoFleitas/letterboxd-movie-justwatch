  <body>
    <style>
      .github-icon-link {
        position: fixed;
        top: 0.75rem;
        right: 0.75rem;
        z-index: 40;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: var(--radius-md);
        background-color: var(--color-surface-elevated);
        border: 1px solid var(--color-border);
        color: var(--color-text-muted);
        text-decoration: none;
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(8px);
        transition:
          transform 0.15s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease;
      }

      .github-icon-link:hover {
        transform: translateY(-1px);
        border-color: var(--color-accent-muted);
        color: var(--color-accent-soft);
        box-shadow: var(--shadow-glow);
      }

      .github-icon-link svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      @media (max-width: 640px) {
        .github-icon-link {
          top: 0.5rem;
          right: 0.5rem;
          width: 28px;
          height: 28px;
        }

        .github-icon-link svg {
          width: 14px;
          height: 14px;
        }
      }
    </style>

    <a
      class="github-icon-link"
      href="https://github.com/DiegoFleitas/letterboxd-movie-justwatch"
      target="_blank"
      rel="noreferrer"
      aria-label="View on GitHub"
    >

          -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
          0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2
          .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
          0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2

    </a>

    <div id="root"></div>

    <script src="/src/main.tsx" type="module"></script>

</html>
